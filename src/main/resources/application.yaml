spring:
  application:
    name: chatbot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chatbot}
    username: ${DB_USERNAME:chatbot_user}
    password: ${DB_PASSWORD:chatbot_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

groq:
  api-key: ${GROQ_API_KEY}
  base-url: https://api.groq.com/openai/v1
  model: llama-3.3-70b-versatile